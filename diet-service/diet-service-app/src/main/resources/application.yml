spring:
  application:
    name: diet-service
  main:
    web-application-type: none
  
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/dubbo_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Dubbo
dubbo:
  application:
    name: diet-service
    qos-enable: false
  registry:
    address: zookeeper://${ZOOKEEPER_HOST:localhost}:${ZOOKEEPER_PORT:2181}
    timeout: 10000
  protocol:
    name: dubbo
    port: 20883
  provider:
    timeout: 30000
  consumer:
    timeout: 30000
    check: false

# Unified logging
app:
  events:
    diet-record-changed:
      stream: ${DIET_RECORD_CHANGED_STREAM:diet_record_changed}
      maxlen: ${DIET_RECORD_CHANGED_STREAM_MAXLEN:10000}
  logging:
    mode: ${APP_LOGGING_MODE:dual}
    json:
      path: ${APP_LOGGING_JSON_PATH:logs}

logging:
  config: classpath:observability-logback-spring.xml
  level:
    root: INFO
    com.example.diet: INFO
    org.apache.dubbo: WARN
    org.mybatis: WARN

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.example.diet: DEBUG
    org.apache.dubbo: INFO
    org.mybatis: DEBUG

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
