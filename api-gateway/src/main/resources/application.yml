server:
  port: 8084

spring:
  application:
    name: api-gateway
  
  # Redis 配置 (用于 JWT 黑名单)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-authentication-minimum-32-chars}
  expiration: 86400000  # 24 小时
  refresh-expiration: 604800000  # 7 天

# Dubbo 配置
dubbo:
  application:
    name: api-gateway
    qos-enable: false
  registry:
    address: zookeeper://${ZOOKEEPER_HOST:localhost}:${ZOOKEEPER_PORT:2181}
    timeout: 10000
  consumer:
    timeout: 30000
    retries: 2
    check: false  # 启动时不检查服务是否可用

# 微信小程序配置
wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}
  login-url: https://api.weixin.qq.com/sns/jscode2session

# AI 服务配置
ai:
  service:
    url: ${AI_SERVICE_URL:http://127.0.0.1:8000}
    token: ${AI_SERVICE_TOKEN:diet-recommend-internal-token-2024}
    timeout: 30000  # 30秒超时（图像识别可能较慢）

# 统一日志配置
app:
  logging:
    mode: ${APP_LOGGING_MODE:dual}
    json:
      path: ${APP_LOGGING_JSON_PATH:logs}
    request-log:
      enabled: ${APP_REQUEST_LOG_ENABLED:true}
      exclude-paths:
        - /actuator/health
        - /actuator/info

logging:
  config: classpath:observability-logback-spring.xml
  level:
    root: INFO
    com.example.diet: INFO
    org.apache.dubbo: WARN
    org.mybatis: WARN

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.example.diet: DEBUG
    org.apache.dubbo: INFO
    org.mybatis: DEBUG
