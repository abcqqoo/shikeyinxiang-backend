spring:
  application:
    name: user-service
  main:
    web-application-type: none
  datasource:
    url: jdbc:mysql://localhost:3306/dubbo_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Dubbo 配置
dubbo:
  application:
    name: user-service
    qos-enable: false
  registry:
    address: zookeeper://localhost:2181
    timeout: 10000
  protocol:
    name: dubbo
    port: 20886
  consumer:
    timeout: ${DUBBO_CONSUMER_TIMEOUT:5000}
    check: false
  scan:
    base-packages: com.example.diet.user.infrastructure.dubbo

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0

# 统一日志配置
app:
  logging:
    mode: ${APP_LOGGING_MODE:dual}
    json:
      path: ${APP_LOGGING_JSON_PATH:logs}

logging:
  config: classpath:observability-logback-spring.xml
  level:
    root: INFO
    com.example.diet: INFO
    org.apache.dubbo: WARN
    org.mybatis: WARN

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.example.diet: DEBUG
    org.apache.dubbo: INFO
    org.mybatis: DEBUG

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
